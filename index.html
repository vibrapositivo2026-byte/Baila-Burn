    <!-- RESERVATION MODAL -->
    <div id="reservationModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-lg w-full mx-4">
            <h3 class="text-3xl font-bold text-pink-400 mb-6 text-center">Reserve Your Spot</h3>
            
            <form action="https://formspree.io/f/xpqg1pv" method="POST" id="reservationForm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="name" placeholder="First Name" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">
                    <input type="text" name="lastname" placeholder="Last Name" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">
                </div>

                <input type="tel" name="phone" placeholder="Phone (WhatsApp)" required class="mt-4 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <label class="block text-sm text-gray-400 mt-5 mb-1">Preferred date for first class</label>
                <input type="date" name="first_class" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <textarea name="message" rows="3" placeholder="Any additional comments? (optional)"
                          class="mt-4 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500"></textarea>

                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="hideReservationModal()" 
                            class="flex-1 py-4 border border-zinc-600 rounded-2xl font-medium hover:bg-zinc-800 transition">
                        Cancel
                    </button>
                    <button type="submit" 
                            class="flex-1 bg-pink-600 hover:bg-pink-500 py-4 rounded-2xl font-bold transition">
                        Send Reservation
                    </button>
                </div>
            </form>
        </div>
    </div>
