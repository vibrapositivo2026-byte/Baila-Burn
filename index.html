<!-- PRICES + RESERVA -->
<section id="prices" class="py-20 bg-zinc-950">
    <div class="max-w-4xl mx-auto px-6 text-center">
        <h2 class="text-4xl font-bold mb-4">Choose Your Option</h2>
        <p class="text-pink-400 mb-12">Pay easily with Revolut</p>

        <div class="grid md:grid-cols-2 gap-8 max-w-2xl mx-auto">
            <!-- Single Class -->
            <div class="bg-zinc-900 border border-pink-600 rounded-3xl p-10">
                <p class="text-pink-400 uppercase tracking-widest text-sm">Single Class</p>
                <p class="text-6xl font-black my-6">€12</p>
                <a href="https://revolut.me/licelppof" target="_blank" 
                   class="block bg-pink-600 hover:bg-pink-500 py-5 rounded-2xl font-bold text-lg">Pay €12</a>
            </div>

            <!-- Pack of 6 Classes -->
            <div class="bg-zinc-900 border-2 border-yellow-400 rounded-3xl p-10 relative">
                <div class="absolute -top-4 right-8 bg-yellow-400 text-black text-xs font-bold px-6 py-1 rounded-full">BEST VALUE</div>
                <p class="text-pink-400 uppercase tracking-widest text-sm">Pack of 6 Classes</p>
                <p class="text-6xl font-black my-6">€60</p>
                <a href="https://revolut.me/licelppof" target="_blank" 
                   class="block bg-pink-600 hover:bg-pink-500 py-5 rounded-2xl font-bold text-lg">Pay €60</a>
            </div>
        </div>

        <!-- Botón Reserva con formulario -->
        <div class="mt-16">
            <button onclick="showReservationModal()" 
                    class="inline-block bg-white text-black font-bold px-10 py-5 rounded-full text-xl hover:bg-pink-500 hover:text-white transition shadow-2xl">
                RESERVE YOUR SPOT
            </button>
        </div>

        <p class="mt-12 text-gray-400 text-sm">
            After payment, you can also send WhatsApp to <strong>087 607 1392</strong>
        </p>
    </div>
</section>

<!-- Modal de Reserva -->
<div id="reservationModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
        <h3 class="text-2xl font-bold text-pink-400 mb-6 text-center">Reserve Your Spot</h3>
        
        <form action="https://formspree.io/f/TU_ENDPOINT_AQUI" method="POST" id="reservationForm">
            <div class="space-y-5">
                <input type="text" name="name" placeholder="Nombre" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <input type="text" name="lastname" placeholder="Apellido" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <input type="tel" name="phone" placeholder="Teléfono (WhatsApp)" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <input type="text" name="first_class_date" placeholder="Fecha deseada para primera clase (ej: 17 Abril)" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500">

                <textarea name="message" rows="3" placeholder="¿Algún comentario adicional? (opcional)"
                          class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-pink-500"></textarea>
            </div>

            <div class="flex gap-4 mt-8">
                <button type="button" onclick="hideReservationModal()"
                        class="flex-1 py-4 border border-zinc-600 rounded-2xl font-medium hover:bg-zinc-800 transition">
                    Cancelar
                </button>
                <button type="submit"
                        class="flex-1 bg-pink-600 hover:bg-pink-500 py-4 rounded-2xl font-bold transition">
                    Enviar Reserva
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Script para abrir/cerrar el modal y mensaje de éxito -->
<script>
function showReservationModal() {
    document.getElementById('reservationModal').classList.remove('hidden');
}

function hideReservationModal() {
    document.getElementById('reservationModal').classList.add('hidden');
}

// Mensaje de éxito después de enviar
document.getElementById('reservationForm').addEventListener('submit', function() {
    setTimeout(() => {
        alert('✅ ¡Reserva enviada con éxito! Licel te contactará pronto por WhatsApp.');
        hideReservationModal();
        this.reset();
    }, 800);
});
</script>
